<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repair System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --main-green: #1b5e20; }
        body { background: #f8f9fa; font-family: 'Sarabun', sans-serif; }
        .sidebar { width: 260px; height: 100vh; background: var(--main-green); color: #fff; position: fixed; }
        .content { margin-left: 260px; padding: 25px; transition: 0.3s; }
        .nav-link { color: #ffffffb3; cursor: pointer; display: flex; align-items: center; padding: 12px 20px; }
        .nav-link:hover, .nav-link.active { color: #fff; background: rgba(255,255,255,0.15); border-radius: 8px; }
        .card-stat { border-radius: 15px; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        @media (max-width: 768px) {
            .sidebar { width: 0; transform: translateX(-100%); }
            .content { margin-left: 0; }
            .sidebar.show { width: 260px; transform: translateX(0); z-index: 1000; }
        }
    </style>
</head>
<body>

<div class="sidebar d-flex flex-column p-3" id="sidebar">
    <h3 class="text-center py-3">ระบบแจ้งซ่อม</h3>
    <hr>
    <nav class="nav flex-column gap-1">
        <a class="nav-link active" onclick="loadDashboard()"><i class="material-icons me-2">dashboard</i> แดชบอร์ด</a>
        <a class="nav-link" data-bs-toggle="modal" data-bs-target="#repairModal"><i class="material-icons me-2">add_box</i> แจ้งซ่อมใหม่</a>
        <div id="admin-tools" style="display:none;">
            <a class="nav-link" onclick="loadUsers()"><i class="material-icons me-2">people</i> จัดการผู้ใช้</a>
        </div>
    </nav>
    <div class="mt-auto p-2 border-top d-flex align-items-center">
        <img id="u-img" src="" class="rounded-circle me-2" width="35">
        <div class="small">
            <div id="u-name" class="fw-bold text-truncate" style="max-width: 150px;">Loading...</div>
            <div id="u-role" class="opacity-75">User</div>
        </div>
    </div>
</div>

<div class="content">
    <button class="btn d-md-none mb-3" onclick="toggleSidebar()"><i class="material-icons">menu</i></button>
    <div id="main-view">
        <div class="row g-3 mb-4" id="stat-cards"></div>
        <div class="card card-stat">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr><th>วันที่</th><th>ทะเบียน</th><th>อาการ</th><th>สถานะ</th><th>จัดการ</th></tr>
                        </thead>
                        <tbody id="repair-table"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="repairModal" tabindex="-1">
    <div class="modal-dialog">
        <form id="repairForm" class="modal-content">
            <div class="modal-header"><h5>แจ้งซ่อมรถยนต์</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <div class="mb-3"><label>ทะเบียนรถ</label><select id="car-list" class="form-select" required></select></div>
                <div class="mb-3"><label>เลขไมล์</label><input type="number" id="mileage" class="form-control" required></div>
                <div class="mb-3"><label>รายละเอียดอาการ</label><textarea id="symptoms" class="form-control" required></textarea></div>
                <div class="mb-3"><label>ประมาณการค่าซ่อม</label><input type="number" id="est-cost" class="form-control" required></div>
                <div class="mb-3"><label>สถานที่</label><input type="text" id="loc" class="form-control" required></div>
                <div class="mb-3"><label>แนบรูป</label><input type="file" id="photo" class="form-control" accept="image/*"></div>
            </div>
            <div class="modal-footer"><button type="submit" class="btn btn-success w-100">ส่งข้อมูล</button></div>
        </form>
    </div>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzltzdAh6mzriXuV-7XryZCbM1SidzfIMv3VPv-gYLjHy5lY5Bj4lYozOiLwZ0srYNeHw/exec";
    let currentUser = { userId: "", name: "", role: "" };

        const data = await res.json();
        if (data.role === "Guest") { alert("ไม่พบสิทธิ์การใช้งาน กรุณาติดต่อแอดมิน"); return; }
        
        currentUser.role = data.role;
        currentUser.name = data.name;
        document.getElementById('u-name').innerText = data.name;
        document.getElementById('u-role').innerText = data.role;
        if (data.role === "Admin") document.getElementById('admin-tools').style.display = "block";
        
        loadDashboard();
        loadCarList();
    } */


    async function initLIFF() {
    await liff.init({ liffId: "2009201666-JexzIIEn" });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    const profile = await liff.getProfile();
    
    // ส่งข้อมูลไปตรวจสอบ/ลงทะเบียนอัตโนมัติ
    const res = await fetch(API_URL, { 
        method: "POST", 
        body: JSON.stringify({ 
            action: "checkAndRegisterUser", 
            userId: profile.userId,
            displayName: profile.displayName 
        }) 
    });
    const data = await res.json();
    
    currentUser = data; // เก็บข้อมูล User ปัจจุบัน
    document.getElementById('u-img').src = profile.pictureUrl;
    document.getElementById('u-name').innerText = data.name;
    document.getElementById('u-role').innerText = data.role;

    if (data.role === "Admin") {
        document.getElementById('admin-tools').style.display = "block";
    }
    loadDashboard();
    loadCarList();    
        
}

    // ฟังก์ชันดึงรายชื่อ User มาแสดง (สำหรับ Admin)
async function loadUsers() {
    const mainView = document.getElementById('main-view');
    mainView.innerHTML = `<div class="text-center"><h4>กำลังโหลดรายชื่อผู้ใช้...</h4></div>`;
    
    const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "getAllUsers" }) });
    const users = await res.json();
    
    let html = `
        <h4 class="mb-4">จัดการบัญชีผู้ใช้งาน</h4>
        <div class="card card-stat"><div class="table-responsive">
        <table class="table align-middle">
            <thead><tr><th>ชื่อ LINE</th><th>ชื่อจริง</th><th>สิทธิ์</th><th>จัดการ</th></tr></thead>
            <tbody>`;
    
    users.forEach(u => {
        html += `
            <tr>
                <td>${u[1]}</td>
                <td>${u[2]}</td>
                <td><span class="badge ${u[3] === 'Admin' ? 'bg-danger' : 'bg-primary'}">${u[3]}</span></td>
                <td>
                    <button class="btn btn-sm btn-outline-success" onclick="editUser('${u[0]}', '${u[2]}', '${u[3]}')">แก้ไข</button>
                </td>
            </tr>`;
    });
    
    html += `</tbody></table></div></div>`;
    mainView.innerHTML = html;
}

// ฟังก์ชันแก้ไข User
async function editUser(id, name, role) {
    const newName = prompt("แก้ไขชื่อจริง:", name);
    const newRole = confirm("ต้องการให้เป็น Admin ใช่หรือไม่? (ตกลง=Admin / ยกเลิก=User)") ? "Admin" : "User";
    
    if (newName) {
        const res = await fetch(API_URL, { 
            method: "POST", 
            body: JSON.stringify({ 
                action: "updateUser", 
                targetUserId: id, 
                realName: newName, 
                role: newRole 
            }) 
        });
        if (res.ok) { alert("อัปเดตเรียบร้อย"); loadUsers(); }
    }
}

    async function loadCarList() {
        const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "getCarList" }) });
        const cars = await res.json();
        const select = document.getElementById('car-list');
        cars.forEach(c => select.innerHTML += `<option value="${c}">${c}</option>`);
    }

// --- ส่วนการจัดการเมนู (แก้ปัญหากดกลับหน้า Dashboard ไม่ได้) ---
async function loadDashboard() {
    // ล้างหน้าจอหลักก่อนโหลด
    const mainView = document.getElementById('main-view');
    mainView.innerHTML = `
        <div class="row g-3 mb-4" id="stat-cards"></div>
        <div class="card card-stat">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr><th>วันที่</th><th>ทะเบียน</th><th>อาการ</th><th>สถานะ</th><th>จัดการ</th></tr>
                        </thead>
                        <tbody id="repair-table"><tr><td colspan="5" class="text-center">กำลังโหลดข้อมูล...</td></tr></tbody>
                    </table>
                </div>
            </div>
        </div>`;

    try {
        const res = await fetch(API_URL, { 
            method: "POST", 
            body: JSON.stringify({ action: "getRepairs", userId: currentUser.userId, role: currentUser.role }) 
        });
        const items = await res.json();
        renderTable(items); // แยกฟังก์ชัน render ออกมา
        renderStats(items); // แสดง Card สรุปสถิติ
    } catch (err) {
        console.error("Dashboard Error:", err);
    }
}

function renderTable(items) {
    const tbody = document.getElementById('repair-table');
    tbody.innerHTML = "";
    if (items.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" class="text-center">ไม่พบข้อมูลการแจ้งซ่อม</td></tr>`;
        return;
    }
    items.reverse().forEach(row => {
        let badgeClass = "bg-secondary";
        if (row[10] === "เสร็จสิ้น") badgeClass = "bg-success";
        if (row[10] === "กำลังซ่อม") badgeClass = "bg-warning text-dark";
        if (row[10] === "ไม่อนุมัติ") badgeClass = "bg-danger";

        tbody.innerHTML += `
            <tr>
                <td>${new Date(row[1]).toLocaleDateString('th-TH')}</td>
                <td><b>${row[4]}</b></td>
                <td>${row[6]}</td>
                <td><span class="badge ${badgeClass}">${row[10]}</span></td>
                <td><button class="btn btn-sm btn-outline-primary" onclick="viewDetail('${row[0]}')">ดู</button></td>
            </tr>`;
    });
}

// --- ส่วนบันทึกแจ้งซ่อม (แก้ปัญหารูปภาพไม่บันทึก) ---
document.getElementById('repairForm').onsubmit = async (e) => {
    e.preventDefault();
    const btnSubmit = e.target.querySelector('button[type="submit"]');
    btnSubmit.disabled = true;
    btnSubmit.innerText = "กำลังบันทึก...";

    try {
        const file = document.getElementById('photo').files[0];
        let base64 = "";
        
        if (file) {
            // ตรวจสอบขนาดไฟล์ (ไม่ควรเกิน 2MB เพื่อความเสถียรของ GAS)
            if (file.size > 2 * 1024 * 1024) {
                alert("ไฟล์รูปภาพใหญ่เกินไป (จำกัด 2MB)");
                btnSubmit.disabled = false;
                btnSubmit.innerText = "ส่งข้อมูล";
                return;
            }
            base64 = await new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.readAsDataURL(file);
            });
        }

        const payload = {
            action: "submitRepair",
            userId: currentUser.userId,
            realName: currentUser.name,
            licensePlate: document.getElementById('car-list').value,
            mileage: document.getElementById('mileage').value,
            symptoms: document.getElementById('symptoms').value,
            estCost: document.getElementById('est-cost').value,
            location: document.getElementById('loc').value,
            image: base64 // ส่ง string base64 เปล่าถ้าไม่มีรูป
        };

        const res = await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
        const result = await res.json();

        if (result.status === "success") {
            alert("บันทึกข้อมูลสำเร็จ!");
            location.reload(); 
        } else {
            throw new Error(result.message);
        }
    } catch (err) {
        alert("เกิดข้อผิดพลาด: " + err.message);
        btnSubmit.disabled = false;
        btnSubmit.innerText = "ส่งข้อมูล";
    }
};
    
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('show'); }
    initLIFF();
</script>
</body>
